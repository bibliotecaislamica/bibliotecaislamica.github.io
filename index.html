<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca Islámica</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f4f0; }
        .header { margin-top: 50px; }
        
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            padding: 20px;
        }

        .card {
            background-color: #8da399;
            color: white;
            padding: 40px;
            border-radius: 15px;
            width: 200px;
            text-decoration: none;
            transition: transform 0.3s, background-color 0.3s;
            display: block;
        }
        
        .card:hover {
            transform: scale(1.05);
            background-color: #728a7f;
        }

        .card h2 { margin-top: 15px; font-size: 1.2rem; }
        .card img { width: 50px; height: 50px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Islamic Library</h1>
        <p>مكتبة إسلامية</p>
    </div>

    <div class="container">
        <!-- Tarjeta que redirige a Discord -->
        <a href="https://discord.gg/fg6HFux9PH" class="card">
            <img src="img/logo.jpg" alt="Logo">
            <h2>DISCORD</h2>
        </a>

        <!-- Otras tarjetas (puedes añadir más aquí) -->
        <a href="knowledge.html" class="card">
            <h2>KNOWLEDGE</h2>
        </a>

        <a href="content.html" class="card">
            <h2>CONTENT</h2>
        </a>
    </div>

</body>
</html>
