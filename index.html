        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Biblioteca Islámica</h1>
    
    <div class="categoria">
        <h2>Ciencias del Corán</h2>
        <ul>
            <li><a href="libros/tafsir_ejemplo.pdf">Tafsir del Noble Corán (Ejemplo)</a></li>
        </ul>
    </div>

    <div class="categoria">
        <h2>Hadith y Sunnah</h2>
        <ul>
            <li><a href="libros/sahih_bukhari.pdf">Sahih al-Bujari</a></li>
        </ul>
    </div>

</html>
